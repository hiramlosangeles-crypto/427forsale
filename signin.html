<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#243b5d" />
  <title>427 Howland Canal — Visitor Sign-In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:  #243b5d;
      --cream: #f5f0e8;
      --gold:  #c5a56c;
      --mid:   #7a96b0;
      --text:  #1a2a3a;
    }

    body {
      background: var(--cream);
      color: var(--text);
      font-family: 'Instrument Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav bar ── */
    header {
      background: var(--navy);
      padding: 18px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    header .brand {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--cream);
      opacity: 0.75;
    }
    header .address {
      font-family: 'Italiana', serif;
      font-size: 22px;
      color: var(--gold);
      letter-spacing: 1px;
    }
    header .address .num {
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 600;
      font-size: 20px;
      letter-spacing: 2px;
    }
    header .visit-type {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 2px;
    }

    /* ── Gold rule ── */
    .rule { width: 48px; height: 2px; background: var(--gold); margin: 0 auto; }

    /* ── Main card ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 48px;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd8ce;
      border-radius: 4px;
      width: 100%;
      max-width: 440px;
      padding: 32px 28px;
    }

    .card h2 {
      font-family: 'Italiana', serif;
      font-size: 26px;
      color: var(--navy);
      text-align: center;
      margin-bottom: 6px;
    }
    .card .sub {
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--mid);
      text-align: center;
      margin-bottom: 24px;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 10px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--navy);
      margin-bottom: 6px;
      font-weight: 500;
    }
    input, select {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #ccc5b8;
      border-radius: 3px;
      background: var(--cream);
      color: var(--text);
      font-family: 'Instrument Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--gold); }
    select { appearance: none; cursor: pointer; }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--navy);
      color: var(--gold);
      font-family: 'Instrument Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      font-weight: 500;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      margin-top: 26px;
      transition: background 0.2s;
    }
    .btn:hover { background: #1a2e4a; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── YES / NO toggle buttons ── */
    .yn-group {
      display: flex;
      gap: 10px;
      margin-top: 2px;
    }
    .yn-group input[type="radio"] { display: none; }
    .yn-group label {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 11px 14px;
      border: 1px solid #ccc5b8;
      border-radius: 3px;
      background: var(--cream);
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 0;
    }
    .yn-group input[type="radio"]:checked + label {
      background: var(--navy);
      color: var(--gold);
      border-color: var(--navy);
    }
    .yn-group label:hover { border-color: var(--gold); }

    /* ── Success state ── */
    .success {
      display: none;
      text-align: center;
      padding: 8px 0 4px;
    }
    .success .check {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .success h3 {
      font-family: 'Italiana', serif;
      font-size: 24px;
      color: var(--navy);
      margin-bottom: 8px;
    }
    .success p {
      font-size: 14px;
      color: var(--mid);
      line-height: 1.6;
    }
    .success .gold-line {
      width: 40px;
      height: 2px;
      background: var(--gold);
      margin: 16px auto;
    }

    /* ── Footer ── */
    footer {
      background: var(--navy);
      padding: 20px 24px;
      text-align: center;
    }
    footer p {
      font-size: 11px;
      color: var(--cream);
      opacity: 0.55;
      letter-spacing: 1px;
    }
    footer a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>

<header>
  <p class="brand">Spaces &amp; Beyond®</p>
  <p class="address"><span class="num">427</span> Howland Canal</p>
  <div class="rule" style="margin-top:6px;"></div>
  <p class="visit-type" id="visitTypeLabel">Visitor Sign-In</p>
</header>

<main>
  <div class="card">
    <h2>Welcome to 427 Howland Canal</h2>
    <p class="sub" id="formSub">Please sign in</p>

    <form id="signinForm">

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Your name" autocomplete="name" required />
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="(310) 000-0000" autocomplete="tel" />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@email.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="interest">I Am Interested In</label>
        <select id="interest">
          <option value="">— Select one —</option>
          <option value="Buying">Buying</option>
          <option value="Leasing">Leasing</option>
          <option value="Both">Both — Buying &amp; Leasing</option>
          <option value="Just looking">Just looking</option>
        </select>
      </div>

      <div class="form-group">
        <label>Are you a real estate professional?</label>
        <div class="yn-group">
          <input type="radio" name="isAgent" id="isAgentYes" value="Yes" />
          <label for="isAgentYes">Yes</label>
          <input type="radio" name="isAgent" id="isAgentNo" value="No" />
          <label for="isAgentNo">No</label>
        </div>
      </div>

      <div class="form-group">
        <label>Are you currently working with a real estate agent?</label>
        <div class="yn-group">
          <input type="radio" name="hasAgent" id="hasAgentYes" value="Yes" />
          <label for="hasAgentYes">Yes</label>
          <input type="radio" name="hasAgent" id="hasAgentNo" value="No" />
          <label for="hasAgentNo">No</label>
        </div>
      </div>

      <button type="submit" class="btn" id="submitBtn">Sign In</button>
    </form>

    <div class="success" id="successMsg">
      <div class="check">✓</div>
      <h3>Thank You</h3>
      <div class="gold-line"></div>
      <p>Steven Bettencourt will follow up with you shortly.<br>Enjoy your tour of 427 Howland Canal.</p>
    </div>
  </div>
</main>

<footer>
  <p>Steven Bettencourt &nbsp;·&nbsp; <a href="tel:3104338281">310-433-8281</a> &nbsp;·&nbsp; Lic. #02225787</p>
</footer>

<script>
(function() {
  var ENDPOINT = 'https://script.google.com/macros/s/AKfycbzwDoPosZ7712dn6QzfEADDgC1ARGgqAjp8nxUIt04BpIfMrq4FAQ2KqzHLzbt110o0hg/exec';

  // Read visit type from URL: ?type=openhouse OR ?type=showing
  var params   = new URLSearchParams(window.location.search);
  var visitType = params.get('type') || 'openhouse';
  var isOpenHouse = visitType !== 'showing';

  // Update labels
  document.getElementById('visitTypeLabel').textContent =
    isOpenHouse ? 'Open House Sign-In' : 'Private Showing Sign-In';
  document.getElementById('formSub').textContent = 'Please sign in';

  // Form submit
  document.getElementById('signinForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Submitting…';

    var isAgentEl  = document.querySelector('input[name="isAgent"]:checked');
    var hasAgentEl = document.querySelector('input[name="hasAgent"]:checked');

    var payload = {
      type:      'showing',
      visitType: isOpenHouse ? 'Open House' : 'Private Showing',
      name:      document.getElementById('name').value.trim(),
      phone:     document.getElementById('phone').value.trim(),
      email:     document.getElementById('email').value.trim(),
      interest:  document.getElementById('interest').value,
      isAgent:   isAgentEl  ? isAgentEl.value  : '',
      hasAgent:  hasAgentEl ? hasAgentEl.value : '',
      userAgent: navigator.userAgent,
      referrer:  document.referrer,
      page:      window.location.href
    };

    fetch(ENDPOINT, {
      method:  'POST',
      body:    JSON.stringify(payload),
      headers: { 'Content-Type': 'application/json' }
    })
    .then(function() { showSuccess(); })
    .catch(function() { showSuccess(); }); // show success even if network hiccup
  });

  function showSuccess() {
    document.getElementById('signinForm').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
  }
})();
</script>

</body>
</html>
